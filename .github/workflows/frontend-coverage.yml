name: Frontend Coverage

on:
  push:
    branches:
      - main
      - developments
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest

    env:
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
      CODACY_ORGANIZATION_PROVIDER: gh
      CODACY_USERNAME: bernam07
      CODACY_PROJECT_NAME: Agonis

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload your coverage reports
        if: ${{ env.CODACY_API_TOKEN != '' }}
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage/lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: error
